<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恆億工程水準測量計算器</title>
<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
<meta name="theme-color" content="#1976d2">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 12px; background:#f4f4f4; }
h2 { text-align:center; }
input, select { width:100%; padding:10px; margin:6px 0; font-size:18px; }
table { width:100%; border-collapse: collapse; margin-top:10px; background:white;}
th, td { border:1px solid #ccc; padding:8px; text-align:center; font-size:16px; }
button { width:100%; padding:14px; margin-top:8px; font-size:18px; }
.result { background:#eef; font-weight:bold; }
.warning { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>恆億工程水準測量計算器</h2>

<label>測線模式</label>
<select id="mode" onchange="saveData()">
<option value="closed">閉合水準（BM→BM）</option>
<option value="attach">附合水準（未知→BM）</option>
<option value="relative">相對高程（無BM）</option>
</select>

<label>工地名稱</label>
<input type="text" id="siteName" placeholder="輸入工地名稱" oninput="saveData()">

<label>起始高程</label>
<input type="text" inputmode="decimal" pattern="[0-9]*" id="bm1" oninput="saveData()">

<label>起始BS</label>
<input type="text" inputmode="decimal" pattern="[0-9]*" id="bm1bs" oninput="saveData()">

<label>終點BM高程（若有）</label>
<input type="text" inputmode="decimal" pattern="[0-9]*" id="bm2" oninput="saveData()">

<label>容許閉合差 (mm)</label>
<input type="text" inputmode="decimal" pattern="[0-9]*" id="tolerance" value="10" oninput="saveData()">

<table id="dataTable">
<thead>
<tr>
<th>點位</th><th>TP</th><th>BS</th><th>FS</th><th>高程</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="addRow()">新增點位</button>
<button onclick="calculate()">計算</button>
<button onclick="exportXLSX()">匯出 Excel</button>
<button onclick="showHelp()">使用教學</button>
<button onclick="clearAll()">清空資料</button>

<h3 id="closure"></h3>

<script>
// 註冊 service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// 新增列
function addRow(){
    let row=document.querySelector("#dataTable tbody").insertRow();
    row.innerHTML=`
    <td><input oninput="saveData()"></td>
    <td><input type="checkbox" onchange="saveData()"></td>
    <td><input type="text" inputmode="decimal" pattern="[0-9]*" oninput="saveData()"></td>
    <td><input type="text" inputmode="decimal" pattern="[0-9]*" oninput="saveData()"></td>
    <td></td>`;
    saveData();
}

// 計算
function calculate(){
    let mode=document.getElementById("mode").value;
    let bm1=parseFloat(document.getElementById("bm1").value);
    let bm1bs=parseFloat(document.getElementById("bm1bs").value);
    let bm2=parseFloat(document.getElementById("bm2").value);
    let tolerance=parseFloat(document.getElementById("tolerance").value);

    if(isNaN(bm1)||isNaN(bm1bs)){ alert("請輸入起始高程與BS"); return; }

    let HI=bm1+bm1bs;
    let lastTP=bm1;
    let sumBS=bm1bs;
    let sumFS=0;
    let rows=document.querySelectorAll("#dataTable tbody tr");

    rows.forEach(row=>{
        let isTP=row.cells[1].querySelector("input").checked;
        let bs=parseFloat(row.cells[2].querySelector("input").value);
        let fs=parseFloat(row.cells[3].querySelector("input").value);

        if(!isNaN(bs)){
            HI=lastTP+bs;
            sumBS+=bs;
        }
        if(!isNaN(fs)){
            let elevation=HI-fs;
            row.cells[4].innerText=elevation.toFixed(4);
            sumFS+=fs;
            if(isTP){ lastTP=elevation; }
        }
    });

    if(mode!="relative" && !isNaN(bm2)){
        let closure=(sumBS-sumFS)-(bm2-bm1);
        let text="ΣBS="+sumBS.toFixed(3)+"  ΣFS="+sumFS.toFixed(3);
        text+="  閉合差="+(closure*1000).toFixed(2)+" mm";

        if(Math.abs(closure*1000)>tolerance){
            text+=" ⚠ 超過容許值";
            document.getElementById("closure").className="warning";
        } else {
            document.getElementById("closure").className="";
        }
        document.getElementById("closure").innerText=text;
    }
    saveData();
}

// 匯出
function exportXLSX(){
    let site=document.getElementById("siteName").value||"水準測量資料";
    let rows=document.querySelectorAll("#dataTable tbody tr");
    let data=[["點位","TP","BS","FS","高程"]];
    rows.forEach(row=>{
        data.push([
            row.cells[0].querySelector("input").value,
            row.cells[1].querySelector("input").checked?"TP":"",
            row.cells[2].querySelector("input").value,
            row.cells[3].querySelector("input").value,
            row.cells[4].innerText
        ]);
    });
    let ws=XLSX.utils.aoa_to_sheet(data);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"資料");
    XLSX.writeFile(wb,site+".xlsx");
}

// 教學
function showHelp(){
    alert(`使用教學：

1️⃣ 閉合水準：
   已知BM → 測點 → 回到已知BM
   系統會計算 ΣBS、ΣFS 與閉合差。
   （白話版本：BM出發，回到BM）

2️⃣ 附合水準：
   起點填假設高程，最後輸入已知BM，
   系統會檢核閉合差。
   （白話版本：任意點出發，BM結束）

3️⃣ 相對高程：
   不需BM，只計算各點高程。
   （白話版本：沒有BM）

操作流程：
輸入起始高程（已知）與BS（BM讀值） → 新增點位 → 填FS（若該點將作為轉點需勾選TP）
若前一點為TP輸入下一點輸入BS → 按計算。

本系統會自動儲存資料，關閉頁面不會消失。`);
}

// 自動儲存
function saveData(){
    localStorage.setItem("surveyData", document.body.innerHTML);
}

// 讀取資料
window.onload=function(){
    let data=localStorage.getItem("surveyData");
    if(data){
        document.body.innerHTML=data;
    }
}

// 清空
function clearAll(){
    if(confirm("確定清空所有資料？")){
        localStorage.clear();
        location.reload();
    }
}
  
// ======================
// 附加功能：保持資料 + 點位排序 + Excel檔名自動加字
// ======================

let originalOrder = [];
let sortedAsc = false;

// 儲存 table 與必要欄位
function saveEnhancedData(){
    let rows=document.querySelectorAll("#dataTable tbody tr");
    let data=[];
    rows.forEach(row=>{
        data.push([
            row.cells[0].querySelector("input").value,
            row.cells[1].querySelector("input").checked,
            row.cells[2].querySelector("input").value,
            row.cells[3].querySelector("input").value,
            row.cells[4].innerText
        ]);
    });
    localStorage.setItem("surveyTable", JSON.stringify(data));

    // 其他欄位
    ["bm1","bm1bs","bm2","tolerance","siteName","mode"].forEach(id=>{
        let el=document.getElementById(id);
        if(el) localStorage.setItem(id, el.value);
    });
}

// 還原資料
function loadEnhancedData(){
    let tableData = localStorage.getItem("surveyTable");
    if(tableData){
        let rows = JSON.parse(tableData);
        let tbody=document.querySelector("#dataTable tbody");
        tbody.innerHTML="";
        rows.forEach(r=>{
            let row = tbody.insertRow();
            row.innerHTML=`
                <td><input value="${r[0]}" oninput="saveEnhancedData()"></td>
                <td><input type="checkbox" ${r[1] ? "checked" : ""} onchange="saveEnhancedData()"></td>
                <td><input type="text" inputmode="decimal" pattern="[0-9]*" value="${r[2]}" oninput="saveEnhancedData()"></td>
                <td><input type="text" inputmode="decimal" pattern="[0-9]*" value="${r[3]}" oninput="saveEnhancedData()"></td>
                <td>${r[4]}</td>`;
        });
    }

    // 還原其他欄位
    ["bm1","bm1bs","bm2","tolerance","siteName","mode"].forEach(id=>{
        let val=localStorage.getItem(id);
        if(val!==null) document.getElementById(id).value=val;
    });
}

// 點位排序
function saveOriginalOrder(){
    originalOrder = Array.from(document.querySelectorAll("#dataTable tbody tr"))
        .map(row => row.cloneNode(true));
}

function sortPoints(){
    let tbody=document.querySelector("#dataTable tbody");

    if(!originalOrder.length){
        originalOrder = Array.from(tbody.querySelectorAll("tr"))
            .map(row => row.cloneNode(true));
    }

    if(sortedAsc){ 
        tbody.innerHTML = "";
        originalOrder.forEach(row => tbody.appendChild(row.cloneNode(true)));
        sortedAsc=false;
    } else { 
        let rows = Array.from(tbody.querySelectorAll("tr"));
        rows.sort((a, b) => {
            let pa = a.cells[0].querySelector("input").value.toUpperCase();
            let pb = b.cells[0].querySelector("input").value.toUpperCase();
            let matchA = pa.match(/^(\d+)?([A-Z]+)?-?(\d+)?$/);
            let matchB = pb.match(/^(\d+)?([A-Z]+)?-?(\d+)?$/);
            let numA = matchA[1] ? parseInt(matchA[1]) : 0;
            let secA = matchA[2] || pa;
            let suffixA = matchA[3] ? parseInt(matchA[3]) : 0;
            let numB = matchB[1] ? parseInt(matchB[1]) : 0;
            let secB = matchB[2] || pb;
            let suffixB = matchB[3] ? parseInt(matchB[3]) : 0;
            if(numA!==numB) return numA-numB;
            if(secA!==secB) return secA.localeCompare(secB);
            return suffixA-suffixB;
        });

        // 先 clone 再 append，不破壞原事件
        let frag=document.createDocumentFragment();
        rows.forEach(row=>frag.appendChild(row.cloneNode(true)));
        tbody.innerHTML = "";
        tbody.appendChild(frag);
        sortedAsc=true;
    }

    saveEnhancedData();
}

// 重新綁定排序按鈕
window.addEventListener("load",()=>{
    loadEnhancedData();
    // 在表格標題加排序按鈕
    let th = document.querySelector("#dataTable thead tr th:first-child");
    if(th && !document.getElementById("sortBtnEnhanced")){
        let btn = document.createElement("button");
        btn.id="sortBtnEnhanced";
        btn.textContent="排序";
        btn.style.marginLeft="4px";
        btn.onclick=sortPoints;
        th.appendChild(btn);
    }
});

// Excel 匯出自動加「水準測量」
let originalExport = exportXLSX;
exportXLSX = function(){
    let site=document.getElementById("siteName").value||"工地";
    let rows=document.querySelectorAll("#dataTable tbody tr");
    let data=[["點位","TP","BS","FS","高程"]];
    rows.forEach(row=>{
        data.push([
            row.cells[0].querySelector("input").value,
            row.cells[1].querySelector("input").checked?"TP":"",
            row.cells[2].querySelector("input").value,
            row.cells[3].querySelector("input").value,
            row.cells[4].innerText
        ]);
    });
    let ws=XLSX.utils.aoa_to_sheet(data);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"資料");
    XLSX.writeFile(wb, site+" 水準測量.xlsx");
}
</script>
  

</body>
</html>
